<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memok AI - 控制台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    nav {
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand svg { width: 24px; height: 24px; }
    .nav-links a {
      color: #a0a0b0;
      text-decoration: none;
      font-size: 14px;
      margin-left: 20px;
      transition: color .2s;
    }
    .nav-links a:hover { color: #fff; }
    .hero {
      max-width: 800px;
      margin: 80px auto;
      text-align: center;
      padding: 0 24px;
    }
    .hero h1 { font-size: 32px; margin-bottom: 12px; color: #fff; }
    .hero p { color: #a0a0b0; font-size: 16px; line-height: 1.6; }
    .cards {
      max-width: 800px;
      margin: 0 auto 60px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
    }
    .card h3 { font-size: 14px; color: #b0b0c0; margin-bottom: 8px; }
    .card .value { font-size: 28px; font-weight: 600; color: #fff; }
  </style>
</head>
<body>
  <nav>
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      Memok AI
    </div>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/settings">设置</a>
      <a href="#" id="logoutLink">退出</a>
    </div>
  </nav>

  <div class="hero">
    <h1>Memok AI 控制台</h1>
    <p>您已成功登录。后续可在此扩展 Dashboard、记忆统计与可视化功能。</p>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Sentence 总数</h3>
      <div class="value" id="sentences">-</div>
    </div>
    <div class="card">
      <h3>Word 总数</h3>
      <div class="value" id="words">-</div>
    </div>
    <div class="card">
      <h3>Link 总数</h3>
      <div class="value" id="links">-</div>
    </div>
  </div>

  <script>
    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    });

    async function loadStats() {
      try {
        const res = await fetch('/v1/db/stats');
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById('sentences').textContent = data.sentences ?? 0;
        document.getElementById('words').textContent = (data.words ?? 0) + (data.normalWords ?? 0);
        document.getElementById('links').textContent = (data.wordToNormalLinks ?? 0) + (data.sentenceToNormalLinks ?? 0);
      } catch (e) {
        console.error('Failed to load stats', e);
      }
    }
    loadStats();
  </script>
</body>
</html>
