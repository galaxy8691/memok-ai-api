<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memok AI - 首次设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(10px);
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
    p.sub { color: #a0a0b0; margin-bottom: 24px; font-size: 14px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: #c0c0d0; }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(0,0,0,0.2);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: #6366f1; }
    .hint { font-size: 12px; color: #808090; margin-top: 4px; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
      margin-top: 8px;
    }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .logo { text-align: center; margin-bottom: 20px; }
    .logo svg { width: 48px; height: 48px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>欢迎使用 Memok AI</h1>
    <p class="sub">首次使用，请设置管理员密码以保护您的数据。</p>
    <div class="error" id="error"></div>
    <form id="setupForm">
      <div class="form-group">
        <label for="password">设置密码</label>
        <input type="password" id="password" name="password" required autocomplete="new-password">
        <div class="hint">至少 6 位字符</div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">确认密码</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password">
      </div>
      <button type="submit" id="submitBtn">完成设置</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('setupForm');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = '设置中…';

      const password = form.password.value;
      const confirmPassword = form.confirmPassword.value;

      if (password !== confirmPassword) {
        showError('两次输入的密码不一致');
        submitBtn.disabled = false;
        submitBtn.textContent = '完成设置';
        return;
      }

      try {
        const res = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, confirmPassword })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = '/';
        } else {
          showError(data.error || '设置失败，请重试');
        }
      } catch (err) {
        showError('网络错误，请重试');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '完成设置';
      }
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
  </script>
</body>
</html>
